<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color</title>
  <link rel="icon" href="img/25adf88-4f8a-6d0f-1da0-2276ddd302be_Colour_Wheel_Tints.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="login-screen" class="screen login-screen">
    <p class="meta login-eyebrow">Maze Development</p>
    <h1 class="serif login-title">Color</h1>
    <p class="subtitle">Pick your account</p>
    <div id="account-picker" class="account-picker">
      <button class="account-btn" data-account="yellow">Yellow</button>
      <button class="account-btn" data-account="green">Green</button>
      <button class="account-btn" data-account="blue">Blue</button>
    </div>
    <form id="login-form" class="login-form" hidden>
      <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>
    <p id="login-error" class="error" hidden></p>
  </main>

  <div id="app-screen" hidden>
    <header class="masthead">
      <div class="mast-inner">
        <div class="mast-logo"><span class="dot"></span>Color</div>
        <div class="mast-nav">
          <span id="current-account" class="current-account"></span>
          <span class="divider"></span>
          <button id="logout-btn" class="pill">Log out</button>
        </div>
      </div>
    </header>

    <main class="frame app-main">
      <section class="upload-card">
        <p class="meta">Upload</p>
        <div class="upload-row">
          <input type="file" id="file-input" accept="image/*" />
          <button id="upload-btn" class="btn btn-primary">Upload</button>
          <span id="upload-status" class="upload-status"></span>
        </div>
      </section>

      <nav class="view-tabs">
        <button class="view-tab selected" data-view="mine">Your Images</button>
        <button class="view-tab" data-view="community">Community</button>
      </nav>

      <section class="gallery-view" data-view="mine">
        <div id="gallery-mine"></div>
      </section>

      <section class="gallery-view community-view" data-view="community" hidden>
        <div class="filter-row">
          <span class="meta">Filter by day</span>
          <div class="day-filter-list" id="day-filter-list"></div>
        </div>
        <div class="community-feed" id="community-feed"></div>
      </section>
    </main>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <button id="lightbox-close" class="lightbox-close" aria-label="Close" type="button">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
