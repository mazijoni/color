name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject config
        run: |
          FILES="config.js"
          sed -i "s|%%PASSWORD_YELLOW%%|${{ secrets.PASSWORD_YELLOW }}|g" $FILES
          sed -i "s|%%PASSWORD_GREEN%%|${{ secrets.PASSWORD_GREEN }}|g" $FILES
          sed -i "s|%%PASSWORD_BLUE%%|${{ secrets.PASSWORD_BLUE }}|g" $FILES
          sed -i "s|%%CLOUDINARY_CLOUD_NAME%%|${{ secrets.CLOUDINARY_CLOUD_NAME }}|g" $FILES
          sed -i "s|%%CLOUDINARY_UPLOAD_PRESET%%|${{ secrets.CLOUDINARY_UPLOAD_PRESET }}|g" $FILES
          sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" $FILES
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" $FILES
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g" $FILES
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" $FILES
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" $FILES
          sed -i "s|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g" $FILES

      - name: Verify substitution succeeded
        run: |
          if grep -qE "%%[A-Z_]+%%" config.js; then
            echo "ERROR: Placeholder found in config.js — secret may be missing or misspelled."
            exit 1
          fi
          echo "✓ config.js — all placeholders substituted."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          cname: color.maze-development.com
